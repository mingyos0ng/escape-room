<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EREBUS — Escape Pod</title>
  <link rel="stylesheet" href="styles.css">
  <style>

    .room-bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 50% 60% at 50% 40%, rgba(0,255,136,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 30% 40% at 20% 80%, rgba(0,180,100,0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 1;
    }

    .topbar { justify-content: space-between; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .breadcrumb {
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      letter-spacing: 0.1em; display: flex; align-items: center; gap: 8px;
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb .sep { color: var(--dim); }
    .breadcrumb .current { color: var(--green); }
    .timer-wrap { display: flex; align-items: center; gap: 10px; }
    .timer-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }

    .shell {
      max-width: 780px; margin: 0 auto;
      padding: 40px 28px 100px; position: relative; z-index: 10;
    }

    /* ── HEADER ── */
    .pod-header {
      text-align: center; margin-bottom: 40px;
      opacity: 0; animation: fadeIn 0.7s ease 0.1s forwards;
    }
    .pod-eyebrow {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3em;
      color: var(--muted); margin-bottom: 14px;
    }
    .pod-title {
      font-family: var(--font-hud); font-size: clamp(28px, 5vw, 46px);
      font-weight: 900; color: #e8f4f8; letter-spacing: 0.1em; margin-bottom: 10px;
    }
    .pod-sub {
      font-family: var(--font-mono); font-size: 12px; color: var(--muted);
      letter-spacing: 0.1em; line-height: 1.8;
    }

    /* ── FRAGMENT STATUS ── */
    .frag-status {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-bottom: 32px;
      opacity: 0; animation: fadeIn 0.7s ease 0.3s forwards;
    }
    @media (max-width: 560px) { .frag-status { grid-template-columns: 1fr 1fr; } }

    .frag-card {
      border: 1px solid var(--border); background: var(--panel);
      padding: 16px 12px; text-align: center;
      transition: border-color 0.4s, background 0.4s;
    }
    .frag-card.loaded {
      border-color: var(--green); background: rgba(0,255,136,0.04);
    }
    .frag-card.missing {
      border-color: var(--danger); background: rgba(255,59,59,0.04);
      animation: pulse 2s infinite;
    }
    .frag-letter {
      font-family: var(--font-hud); font-size: 11px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--muted); margin-bottom: 8px;
    }
    .frag-card.loaded .frag-letter { color: var(--green); }
    .frag-card.missing .frag-letter { color: var(--danger); }
    .frag-val {
      font-family: var(--font-hud); font-size: 20px; font-weight: 900;
      letter-spacing: 0.15em; color: var(--dim); transition: color 0.4s;
    }
    .frag-card.loaded .frag-val  { color: var(--green); }
    .frag-card.missing .frag-val { color: var(--danger); font-size: 13px; }
    .frag-module {
      font-family: var(--font-mono); font-size: 9px; color: var(--muted);
      letter-spacing: 0.1em; margin-top: 6px;
    }

    /* ── KEYPAD PANEL ── */
    .keypad-panel {
      border: 1px solid var(--border); background: var(--panel);
      padding: 36px 40px; position: relative; margin-bottom: 24px;
      opacity: 0; animation: fadeIn 0.7s ease 0.5s forwards;
    }
    .keypad-panel::before, .keypad-panel::after {
      content: ''; position: absolute; height: 1px; left: 0; right: 0;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      opacity: 0.2;
    }
    .keypad-panel::before { top: 0; } .keypad-panel::after { bottom: 0; }
    .keypad-label {
      position: absolute; top: -9px; left: 20px;
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      background: var(--panel); padding: 0 8px; letter-spacing: 0.1em;
    }

    /* combined code display */
    .code-display {
      font-family: var(--font-hud); font-size: clamp(22px, 4vw, 36px);
      font-weight: 900; letter-spacing: 0.3em; color: #e8f4f8;
      text-align: center; margin-bottom: 8px;
      min-height: 50px;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; flex-wrap: wrap;
    }
    .code-seg { transition: color 0.4s; }
    .code-seg.loaded { color: var(--green); }
    .code-seg.empty  { color: var(--dim); }
    .code-sep { color: var(--dim); font-size: 16px; opacity: 0.4; }
    .code-sublabel {
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      text-align: center; letter-spacing: 0.15em; margin-bottom: 28px;
    }

    /* input row */
    .input-row {
      display: flex; gap: 0; margin-bottom: 16px;
      border: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .input-row::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      height: 2px; background: var(--green); width: 0; transition: width 0.4s;
    }
    .input-row.active::after { width: 100%; }

    .code-input {
      flex: 1; font-family: var(--font-hud); font-size: 20px; font-weight: 700;
      letter-spacing: 0.35em; background: var(--panel-2); border: none; outline: none;
      color: #e8f4f8; padding: 14px 20px; caret-color: var(--green); text-align: center;
    }
    .code-input::placeholder { color: var(--dim); letter-spacing: 0.15em; font-size: 13px; }
    .code-input:disabled { opacity: 0.5; }

    /* launch button */
    .launch-btn {
      width: 100%; font-family: var(--font-hud); font-size: 13px; font-weight: 700;
      letter-spacing: 0.3em; padding: 18px; border: 1px solid var(--muted);
      color: var(--muted); background: transparent; cursor: not-allowed;
      transition: all 0.3s; position: relative; overflow: hidden;
      margin-bottom: 0;
    }
    .launch-btn.ready {
      border-color: var(--green); color: var(--green); cursor: pointer;
    }
    .launch-btn.ready::before {
      content: ''; position: absolute; inset: 0;
      background: var(--green); transform: translateX(-101%);
      transition: transform 0.4s ease; z-index: 0;
    }
    .launch-btn.ready:hover::before { transform: translateX(0); }
    .launch-btn.ready:hover { color: var(--bg); }
    .launch-btn span { position: relative; z-index: 1; }

    .feedback {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
      text-align: center; margin-top: 14px; min-height: 18px;
    }
    .feedback.ok   { color: var(--green); }
    .feedback.fail { color: var(--danger); }
    .feedback.warn { color: var(--warn); }

    .lockout-bar {
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: var(--danger); width: 100%;
      transform: scaleX(0); transform-origin: left; transition: none;
    }
    .lockout-bar.animating { transform: scaleX(1); transition: transform 15s linear; }

    /* ── MISSING FRAGMENTS WARNING ── */
    .missing-warn {
      border: 1px solid var(--danger); background: rgba(255,59,59,0.04);
      padding: 16px 20px; margin-bottom: 24px; display: none;
    }
    .missing-warn.show { display: block; }
    .missing-warn-text {
      font-family: var(--font-mono); font-size: 12px; color: var(--danger);
      line-height: 1.8; letter-spacing: 0.05em;
    }
    .missing-warn-text a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent);
